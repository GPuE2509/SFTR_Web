<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FloodSense Admin - Flood Warning and Rescue System - Control Center" />
    <meta name="theme-color" content="#080d1a" />
    <title>FloodSense Admin | Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force English validation messages globally for HTML5 required inputs
      document.addEventListener('invalid', function(e) {
        var el = e.target;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
          if (el.validity.valueMissing) {
            el.setCustomValidity('Please fill out this field.');
          } else if (el.validity.typeMismatch) {
            el.setCustomValidity('Please enter a valid value.');
          } else {
            el.setCustomValidity('Invalid input.');
          }
        }
      }, true);

      document.addEventListener('input', function(e) {
        var el = e.target;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
          el.setCustomValidity('');
        }
      }, true);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
